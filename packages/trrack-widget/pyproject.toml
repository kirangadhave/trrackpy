[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "trrack-widget"
version = "0.0.1a1"
description = "anywidget time-travel controls powered by trrack."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "trrack>=0.0.1a1",
    "anywidget>=0.11.0",
]
license = "BSD-3-Clause"
authors = [{ name = "Kiran Gadhave" }]
keywords = ["provenance", "history", "undo", "time-travel", "trrack"]
classifiers = [
    "License :: OSI Approved :: BSD License",
    "Framework :: Jupyter",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/kirangadhave/trrackpy"
Repository = "https://github.com/kirangadhave/trrackpy"

[tool.hatch.build]
only-packages = true
artifacts = ["src/trrack_widget/static/*"]

[tool.hatch.build.targets.wheel]
packages = ["src/trrack_widget"]

[tool.hatch.build.hooks.jupyter-builder]
build-function = "hatch_jupyter_builder.npm_builder"
ensured-targets = ["src/trrack_widget/static/controls.js"]
skip-if-exists = ["src/trrack_widget/static/controls.js"]
dependencies = ["hatch-jupyter-builder>=0.5.0"]

[tool.hatch.build.hooks.jupyter-builder.build-kwargs]
npm = "pnpm"
build_cmd = "build"
