name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # `uv run` editable-installs trrack-widget, whose build hook runs `pnpm build`,
  # so these jobs need node/pnpm and a built bundle even though ruff/ty don't
  # read the compiled JS themselves.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build frontend bundle
        run: cd packages/trrack-widget && pnpm install && pnpm run build
      - run: uv run ruff check --output-format=github packages
      - run: uv run ruff format --check packages

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build frontend bundle
        run: cd packages/trrack-widget && pnpm install && pnpm run build
      - run: uv run ty check packages

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build frontend bundle
        run: |
          cd packages/trrack-widget
          pnpm install
          pnpm run build
      - name: Run tests
        run: uv run pytest -v
        env:
          UV_PYTHON: ${{ matrix.python-version }}

  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: |
          cd packages/trrack-widget
          pnpm install
          pnpm run lint
          pnpm run format:check
          pnpm run typecheck
