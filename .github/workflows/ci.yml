name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      # ruff/ty don't need the compiled JS, and these jobs have no pnpm. Stub the
      # bundle so the editable install's frontend build hook skips (skip-if-exists).
      - run: mkdir -p packages/trrack-widget/src/trrack_widget/static && touch packages/trrack-widget/src/trrack_widget/static/controls.js
      - run: uv run ruff check --output-format=github packages
      - run: uv run ruff format --check packages

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: mkdir -p packages/trrack-widget/src/trrack_widget/static && touch packages/trrack-widget/src/trrack_widget/static/controls.js
      - run: uv run ty check packages

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build frontend bundle
        run: |
          cd packages/trrack-widget
          pnpm install
          pnpm run build
      - name: Run tests
        run: uv run pytest -v
        env:
          UV_PYTHON: ${{ matrix.python-version }}

  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: |
          cd packages/trrack-widget
          pnpm install
          pnpm run lint
          pnpm run format:check
          pnpm run typecheck
